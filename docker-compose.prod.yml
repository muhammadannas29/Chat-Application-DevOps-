version: '3.9'

# Production compose — used on EC2
# Differences from local:
#   - No port 5000 exposed publicly (only nginx on 80/443)
#   - Restart always
#   - Resource limits set

services:

  redis:
    image: redis:7-alpine
    container_name: chatapp_redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - chatapp_network
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    image: ${ECR_REGISTRY}/chatapp-backend:${IMAGE_TAG:-latest}
    container_name: chatapp_backend
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV:   production
      PORT:       5000
      REDIS_URL:  redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/health']
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 40s
    networks:
      - chatapp_network
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    image: ${ECR_REGISTRY}/chatapp-frontend:${IMAGE_TAG:-latest}
    container_name: chatapp_frontend
    restart: always
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chatapp_network
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  redis_data:

networks:
  chatapp_network:
    driver: bridge
