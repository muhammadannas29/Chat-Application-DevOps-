name: Chat Application CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  NODE_VERSION: "20"
  VITE_API_URL: ${{ vars.VITE_API_URL || '/api' }}
  VITE_WS_URL: ${{ vars.VITE_WS_URL || 'ws://localhost/ws' }}

jobs:
  test-and-build:
    name: Install, test, and build Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chatapp
        run: npm run db:generate

      - name: Run backend tests
        working-directory: backend
        run: npm test --if-present

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --if-present

      - name: Build frontend app
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_WS_URL: ${{ env.VITE_WS_URL }}
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t chatapp-backend:${{ github.sha }} ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL="${VITE_API_URL}" \
            --build-arg VITE_WS_URL="${VITE_WS_URL}" \
            -t chatapp-frontend:${{ github.sha }} \
            ./frontend

  deploy:
    name: Deploy to EC2 with Docker Compose
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: SSH into EC2 and update application
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_WS_URL: ${{ env.VITE_WS_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          envs: DEPLOY_BRANCH,EC2_APP_DIR,VITE_API_URL,VITE_WS_URL
          script_stop: true
          script: |
            cd "$EC2_APP_DIR"

            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            if [ -f .env.production ]; then
              cp .env.production backend/.env
            fi

            test -f backend/.env

            docker compose -f docker-compose.yml build \
              --build-arg VITE_API_URL="$VITE_API_URL" \
              --build-arg VITE_WS_URL="$VITE_WS_URL"

            docker compose -f docker-compose.yml up -d --remove-orphans
            docker image prune -f

            sleep 10
            curl -fsS http://localhost/health
